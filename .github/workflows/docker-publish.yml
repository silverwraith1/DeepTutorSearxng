name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., 1.0.4)"
        required: true
        type: string
        default: "1.0.4"
      push_latest:
        description: "Also update the 'latest' tag?"
        required: true
        type: boolean
        default: true
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: silverwraith1/deeptutorsearxng

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BACKEND_PORT=8001

      - name: Generate Summary
        if: always()
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "Build for version \`${{ github.event.inputs.version }}\` completed." >> $GITHUB_STEP_SUMMARY
          echo "Platform: \`linux/amd64\`" >> $GITHUB_STEP_SUMMARY
